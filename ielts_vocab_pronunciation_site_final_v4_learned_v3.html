<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>雅思听力高频词汇 · 发音练习网站</title>
<style>
:root{
  --bg:#0b1020;--panel:#121a30;--panel2:#16203a;--text:#eef3ff;--muted:#9eb0d1;--line:rgba(255,255,255,.08);
  --accent:#7cc4ff;--accent2:#8bffcc;--warning:#ffd66e;--danger:#ff8ea1;--shadow:0 10px 30px rgba(0,0,0,.25);--radius:18px
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:
radial-gradient(circle at top right,rgba(124,196,255,.12),transparent 25%),
radial-gradient(circle at top left,rgba(139,255,204,.10),transparent 20%),var(--bg);color:var(--text)}
.wrap{max-width:1380px;margin:0 auto;padding:24px}
.hero{display:grid;gap:16px;margin-bottom:20px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;color:var(--accent2);background:rgba(139,255,204,.08);border:1px solid rgba(139,255,204,.16)}
.title{font-size:clamp(28px,4vw,44px);font-weight:800}
.subtitle{color:var(--muted);line-height:1.7;max-width:980px}
.panel{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.toolbar{display:grid;grid-template-columns:1.25fr .78fr .9fr;gap:12px;margin-bottom:18px}
.box{padding:14px 16px}
.label{font-size:13px;color:var(--muted);margin-bottom:8px}
.searchInput,.select,.tinyInput{width:100%;background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;outline:none}
.actionRow{display:flex;flex-wrap:wrap;gap:10px}
.btn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer;font-size:14px;transition:.15s ease}
.btn:hover{transform:translateY(-1px);background:rgba(124,196,255,.12)}
.btn.primary{background:rgba(124,196,255,.16)}
.btn.warn{background:rgba(255,214,110,.12)}
.btn.danger{background:rgba(255,142,161,.10)}
.layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
.sidebar{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow:auto;padding:16px}
.sidebar h3{margin:0 0 12px;font-size:16px}
.navGroup{margin-bottom:18px}
.navPart{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent2);margin:0 0 8px}
.navLink{display:block;padding:8px 10px;margin-bottom:6px;text-decoration:none;color:var(--muted);border-radius:10px;border:1px solid transparent;transition:.15s ease;font-size:14px}
.navLink:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--line)}
.content{display:grid;gap:18px}
.section{padding:18px}
.sectionHead{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:12px}
.sectionTitle{margin:0;font-size:24px}
.sectionMeta{color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{padding:14px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);display:grid;gap:10px;min-height:150px}
.termRow{display:flex;gap:10px;align-items:start;justify-content:space-between}
.term{font-size:18px;font-weight:700;line-height:1.3}
.ipa{font-size:13px;color:var(--accent);word-break:break-word;min-height:18px}
.meaning{color:#dbe6ff;line-height:1.55;font-size:15px}
.cardActions{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto}
.iconBtn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;min-width:42px;height:42px;cursor:pointer;transition:.15s ease;font-size:17px}
.iconBtn:hover{transform:translateY(-1px);background:rgba(124,196,255,.16)}
.iconBtn.active{background:rgba(255,214,110,.16);border-color:rgba(255,214,110,.28)}
.smallTag{display:inline-flex;align-items:center;padding:5px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{padding:14px 16px}
.statNum{font-size:24px;font-weight:800}
.statLabel{font-size:13px;color:var(--muted)}
.notice{padding:12px 14px;color:var(--muted);font-size:13px}
.empty{padding:28px;text-align:center;color:var(--muted)}
.quiz{padding:16px}
.mobileSticky{position:sticky;top:0;z-index:20}
.progressSection{padding:16px}
.progressTrack{height:12px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.progressFill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progressText{margin-top:8px;color:var(--muted);font-size:13px}
.dictationInput{width:100%;background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:18px;outline:none}
.resultGood{color:var(--accent2);font-weight:700}
.resultBad{color:var(--danger);font-weight:700}
.listBlock{display:grid;gap:10px}
.errorItem{padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.errorTop{display:flex;justify-content:space-between;gap:10px;align-items:center}
.errorWord{font-weight:800}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted)}
@media (max-width:620px){.wrap{padding:14px}.box{padding:12px}.section{padding:14px}.title{line-height:1.15}.term{font-size:17px}.playingBar{bottom:6px}}

.quiz h3{margin:0 0 10px}
.quizCard{display:grid;gap:12px}
.quizWord{font-size:28px;font-weight:800}
.quizOptions{display:grid;gap:8px}
.quizOption{text-align:left}
.muted{color:var(--muted)}
.hiddenCn .meaning{display:none}
.hiddenIpa .ipa{display:none}
.playingBar{position:sticky;bottom:10px;z-index:10;padding:12px 16px;display:none;align-items:center;justify-content:space-between;gap:10px;background:rgba(18,26,48,.92);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-top:14px}
.playingBar.show{display:flex}
.progressOuter{height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;flex:1}
.progressInner{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2))}

.select, .tinyInput, .searchInput{appearance:none}
select option{background:#121a30;color:#eef3ff}

@media (max-width:1100px){.toolbar{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
@media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar{position:static;max-height:none}}
@media (max-width:620px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="badge">IELTS Listening Vocabulary · 美音朗读 · 本地收藏</div>
    <div class="title">雅思听力高频词汇 · 智能背词训练系统</div>
    <div class="subtitle">
      基于雅思听力高频词汇构建的系统化背词网站，支持发音训练、听写、测试与错题复习。现在还新增了：
      <strong>播放全部</strong>、<strong>收藏</strong>、<strong>已学会</strong>、<strong>随机抽词练习</strong>、
      <strong>中英显示切换</strong> 和 <strong>本地进度保存</strong>。
    </div>
    
  </div>

  <div class="stats">
    <div class="panel stat"><div class="statNum" id="statTotal">1025</div><div class="statLabel">总词条</div></div>
    <div class="panel stat"><div class="statNum" id="statVisible">1025</div><div class="statLabel">当前显示</div></div>
    <div class="panel stat"><div class="statNum" id="statFav">0</div><div class="statLabel">已收藏</div></div>
    <div class="panel stat"><div class="statNum" id="statLearned">0</div><div class="statLabel">已学会</div></div>
    
  </div>

  <div class="toolbar" style="grid-template-columns:1.2fr .8fr .8fr .8fr .7fr;">
    <div class="panel box">
      <div class="label">搜索词汇 / 音标 / 中文释义</div>
      <input id="searchInput" class="searchInput" placeholder="例如：accommodation / biology / 宿舍 / research" />
    </div>
    <div class="panel box">
      <div class="label">模块筛选</div>
      <select id="partSelect" class="select">
        <option value="all">全部模块</option>
      </select>
    </div>
    <div class="panel box">
      <div class="label">子模块筛选</div>
      <select id="sectionSelect" class="select">
        <option value="all">全部子模块</option>
      </select>
    </div>
    <div class="panel box">
      <div class="label">视图筛选</div>
      <select id="viewSelect" class="select">
        <option value="all">全部词条</option>
        <option value="favorites">只看收藏</option>
        <option value="learned">只看已学会</option>
        <option value="unlearned">只看未学会</option>
      </select>
    </div>
    <div class="panel box">
      <div class="label">发音选择</div>
      <select id="accentSelect" class="select">
        <option value="en-US">美音</option>
        <option value="en-GB">英音</option>
      </select>
    </div>
    
  </div>

  <div class="toolbar" style="grid-template-columns:1fr 240px;">
    <div class="panel box">
      <div class="label">播放次数</div>
      <input id="repeatInput" class="tinyInput" type="number" min="1" max="10" step="1" value="1" />
    </div>
    <div class="panel box">
      <div class="label">说明</div>
      
  </div>

  <div class="toolbar" style="grid-template-columns:1fr;">
    <div class="panel box">
      <div class="actionRow">
        <button id="toggleCnBtn" class="btn">隐藏中文</button>
        <button id="toggleIpaBtn" class="btn">隐藏音标</button>
        <button id="playVisibleBtn" class="btn primary">播放当前筛选全部</button>
        <button id="stopPlayBtn" class="btn danger">停止播放</button>
        <button id="randomQuizBtn" class="btn warn" style="background:#ffd66e;color:#000;font-weight:700">随机抽词练习</button>
        <button id="dictationModeBtn" class="btn primary" style="background:#7cc4ff;color:#000;font-weight:700">听写模式</button>
        <button id="mistakeBookBtn" class="btn">错题本</button>
        <button id="clearProgressBtn" class="btn">清空本地收藏/进度</button>
      </div>
      
  </div>

  <div class="layout">
    <aside id="sidebar" class="panel sidebar"></aside>
    <main class="content">
      <section id="quizPanel" class="panel quiz" style="display:none;"></section>
      <section class="panel progressSection">
        <div class="badge">章节进度</div>
        <div class="progressTrack"><div id="overallProgressFill" class="progressFill"></div></div>
        <div id="overallProgressText" class="progressText">已学会 0 / 0</div>
      </section>
      <section id="mistakeBookPanel" class="panel quiz" style="display:none;"></section>
      <div id="content"></div>
      <div id="playingBar" class="playingBar">
        <div id="playingText" class="muted">未播放</div>
        <div class="progressOuter"><div id="progressInner" class="progressInner"></div></div>
      </div>
    </main>
  </div>
</div>

const esc = s => String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
const slugify = str => String(str).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

let favorites = new Set(JSON.parse(localStorage.getItem(storageKeyFav) || '[]'));
let learned = new Set(JSON.parse(localStorage.getItem(storageKeyLearned) || '[]'));

function itemId(sec, item) {
  return `${sec.part}|||${sec.section}|||${item.term}`;
}

function saveState() {
  localStorage.setItem(storageKeyFav, JSON.stringify([...favorites]));
  localStorage.setItem(storageKeyLearned, JSON.stringify([...learned]));
  localStorage.setItem(uiStateKey, JSON.stringify(uiState));
  localStorage.setItem(mistakesKey, JSON.stringify(mistakes));
}

function updateStats(visibleCount) {
  statVisible.textContent = visibleCount;
  statFav.textContent = favorites.size;
  statLearned.textContent = learned.size;
  const learnedCount = learned.size;
  const total = TOTAL || 1;
  overallProgressFill.style.width = `${(learnedCount/total)*100}%`;
  overallProgressText.textContent = `已学会 ${learnedCount} / ${TOTAL} · 总体进度 ${Math.round((learnedCount/total)*100)}%`;
}

function getVoice(langPref) {
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const pref = langPref || uiState.accent || 'en-US';
  const preferredNameRegex = pref === 'en-GB'
    ? /Google|Serena|Daniel|Arthur|Ryan|Sonia|Libby|Mia/i
    : /Google|Samantha|Jenny|Aria|Emma|Eric|Guy|Ivy|Joanna|Matthew|Michelle/i;
  return voices.find(v => new RegExp(pref.replace('-', '[-_]'), 'i').test(v.lang) && preferredNameRegex.test(v.name))
    || voices.find(v => new RegExp(pref.replace('-', '[-_]'), 'i').test(v.lang))
    || voices.find(v => /^en/i.test(v.lang))
    || null;
}

function speak(text, onend, timesLeft) {
  if(!('speechSynthesis' in window)) {
    alert('当前浏览器不支持语音朗读。');
    return;
  }
  const remain = Number.isFinite(timesLeft) ? timesLeft : Math.max(1, parseInt(uiState.repeatCount || 1, 10));
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = uiState.accent || 'en-US';
  u.rate = .95;
  u.pitch = 1;
  const voice = getVoice(uiState.accent);
  if(voice) u.voice = voice;
  u.onend = () => {
    if(remain > 1) {
      setTimeout(() => speak(text, onend, remain - 1), 120);
    } else if(onend) {
      onend();
    }
  };
  currentUtterance = u;
  speechSynthesis.speak(u);
}

function playDing() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1318.5, now);
    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.08);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.24);
  } catch (e) {}
}

function stopPlayback() {
  playQueue = [];
  playIndex = -1;
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  playingBar.classList.remove('show');
  progressInner.style.width = '0%';
  playingText.textContent = '未播放';
}

function startQueue(terms) {
  if(!terms.length) {
    alert('当前筛选下没有可播放的词条。');
    return;
  }
  playQueue = terms.slice();
  playIndex = 0;
  playingBar.classList.add('show');
  playNext();
}

function playNext() {
  if(playIndex < 0 || playIndex >= playQueue.length) {
    stopPlayback();
    return;
  }
  const item = playQueue[playIndex];
  playingText.textContent = `播放中：${item.term}`;
  progressInner.style.width = `${((playIndex+1)/playQueue.length)*100}%`;
  speak(item.term, () => {
    playIndex += 1;
    setTimeout(playNext, 180);
  });
}

function cleanSectionName(name) {
  return String(name || '').replace(/[:：]\s*$/,'').trim();
}

const FULL = DATA.map(section => ({
  ...section,
  displaySection: cleanSectionName(section.section),
  items: section.items.map(item => ({
    ...item,
    key: itemId(section, item),
    searchText: `${item.term} ${item.ipa||''} ${item.meaning||''}`.toLowerCase()
  }))
}));

const ALL_ITEMS = FULL.flatMap(sec => sec.items.map(item => ({...item, part: sec.part, section: sec.section, displaySection: sec.displaySection})));
function findItemByKey(key) {
  return ALL_ITEMS.find(x => x.key === key);
}
function addMistake(item) {
  if (!item || !item.key) return;
  mistakes[item.key] = {
    term: item.term,
    ipa: item.ipa || '',
    meaning: item.meaning || '',
    part: item.part,
    section: item.displaySection || item.section,
    wrongCount: (mistakes[item.key]?.wrongCount || 0) + 1,
    updatedAt: Date.now()
  };
  saveState();
}
function removeMistake(key) {
  delete mistakes[key];
  saveState();
}

function getFilteredData() {
  const q = searchInput.value.trim().toLowerCase();
  const part = partSelect.value;
  const sectionName = sectionSelect.value;
  const mode = viewSelect.value;
  return FULL
    .filter(sec => (part === 'all' ? true : sec.part === part) && (sectionName === 'all' ? true : sec.section === sectionName))
    .map(sec => ({
      ...sec,
      items: sec.items.filter(item => {
        const passSearch = !q || item.searchText.includes(q);
        const passMode = mode === 'all' ? true :
          mode === 'favorites' ? favorites.has(item.key) :
          mode === 'learned' ? learned.has(item.key) :
          !learned.has(item.key);
        return passSearch && passMode;
      })
    }))
    .filter(sec => sec.items.length);
}

function renderSidebar(data) {
  const byPart = data.reduce((a,c) => {
    const k = c.part || 'Other';
    (a[k] ??= []).push(c);
    return a;
  }, {});
  sidebar.innerHTML = '<h3>目录导航</h3>' +
    Object.entries(byPart).map(([part, sections]) => `
      <div class="navGroup">
        <div class="navPart">${esc(part)}</div>
        ${sections.map(sec => `<a class="navLink" href="#${slugify(sec.part+'-'+(sec.displaySection || sec.section))}">${esc(sec.section)}</a>`).join('')}
      </div>
    `).join('');
}

function renderContent() {
  const visible = getFilteredData();
  const count = visible.reduce((s,sec)=>s+sec.items.length,0);
  updateStats(count);
  document.body.classList.toggle('hiddenCn', !!uiState.hideCn);
  document.body.classList.toggle('hiddenIpa', !!uiState.hideIpa);
  toggleCnBtn.textContent = uiState.hideCn ? '显示中文' : '隐藏中文';

  renderSidebar(visible.length ? visible : FULL);

  if(!visible.length) {
    content.innerHTML = '<div class="panel empty">没有匹配结果，换个关键词试试。</div>';
    return;
  }

  content.innerHTML = visible.map(sec => `
    <section class="panel section" id="${slugify(sec.part+'-'+(sec.displaySection || sec.section))}">
      <div class="sectionHead">
        <div>
          <div class="badge">${esc(sec.part)}</div>
          <h2 class="sectionTitle">${esc(sec.displaySection || sec.section)}</h2>
        </div>
        <div class="sectionMeta">${sec.items.length} 条词汇 · 已学会 ${sec.items.filter(item => learned.has(item.key)).length} 条</div>
      </div>
      <div class="grid">
        ${sec.items.map(item => `
          <article class="card">
            <div class="termRow">
              <div>
                <div class="term">${esc(item.term)}</div>
                <div class="ipa">${esc(item.ipa || '')}</div>
              </div>
              <button class="iconBtn playBtn" type="button" aria-label="播放发音" data-term="${esc(item.term)}">🔊</button>
            </div>
            <div class="meaning">${esc(item.meaning || '—')}</div>
            <div class="cardActions">
              <button class="iconBtn favBtn ${favorites.has(item.key)?'active':''}" data-key="${esc(item.key)}" title="收藏">⭐</button>
              <button class="iconBtn learnedBtn ${learned.has(item.key)?'active':''}" data-key="${esc(item.key)}" title="已学会">✅</button>
              <span class="smallTag">${favorites.has(item.key)?'已收藏':'可收藏'}</span>
              <span class="smallTag">${learned.has(item.key)?'已学会':'待学习'}</span>
            </div>
          </article>
        `).join('')}
      </div>
    </section>
  `).join('');

  content.querySelectorAll('.playBtn').forEach(btn => btn.addEventListener('click', () => speak(btn.dataset.term)));
  content.querySelectorAll('.favBtn').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    if(favorites.has(key)) favorites.delete(key); else favorites.add(key);
    saveState(); renderContent();
  }));
  content.querySelectorAll('.learnedBtn').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    if(learned.has(key)) learned.delete(key); else { learned.add(key); removeMistake(key); }
    saveState(); renderContent();
  }));
}

function getVisibleTerms() {
  return getFilteredData().flatMap(sec => sec.items);
}

function shuffle(arr) {
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function openQuiz() {
  const pool = getVisibleTerms().filter(item => !learned.has(item.key));
  if(pool.length < 4) {
    alert('当前筛选下词条少于 4 个，无法开始随机练习。');
    return;
  }
  mistakeBookPanel.style.display = 'none';
  quizPanel.style.display = 'block';
  const answer = pool[Math.floor(Math.random()*pool.length)];

  const options = shuffle([answer, ...others]);
  quizPanel.innerHTML = `
    <div class="quizCard">
      <div>
        <div class="badge">随机抽词练习</div>
        <h3>这个单词是什么意思？</h3>

      <div class="muted">${esc(answer.ipa || '')}</div>
      <div class="actionRow">
        <button class="btn primary" id="quizPlay">播放发音</button>
        <button class="btn" id="quizNext">换一个</button>
        <button class="btn" id="quizClose">关闭练习</button>
      </div>
      <div class="quizOptions">
        ${options.map(opt => `<button class="btn quizOption" data-key="${esc(opt.key)}" data-correct="${opt.key===answer.key?'1':'0'}" data-answer="${esc(answer.meaning||'—')}">${esc(opt.meaning || '—')}</button>`).join('')}
      </div>
      <div id="quizResult" class="muted"></div>
    </div>
  `;
  document.getElementById('quizPlay').onclick = () => speak(answer.term);
  document.getElementById('quizNext').onclick = openQuiz;
  document.getElementById('quizClose').onclick = () => quizPanel.style.display = 'none';
  setTimeout(() => speak(answer.term), 120);
  quizPanel.querySelectorAll('.quizOption').forEach(btn => btn.addEventListener('click', () => {
    const ok = btn.dataset.correct === '1';
    const result = document.getElementById('quizResult');
    if(ok) {
      result.innerHTML = '<span class="resultGood">答对了。</span>';
      playDing();
    } else {
      result.innerHTML = `<span class="resultBad">答错了，正确答案：${btn.dataset.answer}</span>`;
      addMistake(answer);
    }
  }));
  quizPanel.scrollIntoView({behavior:'smooth', block:'start'});
}

function openDictationMode() {
  const pool = getVisibleTerms().filter(item => !learned.has(item.key));
  if(!pool.length) {
    alert('当前筛选下没有可用于听写的词条。');
    return;
  }
  mistakeBookPanel.style.display = 'none';
  quizPanel.style.display = 'block';
  const answer = pool[Math.floor(Math.random()*pool.length)];
  quizPanel.innerHTML = `
    <div class="quizCard">
      <div>
        <div class="badge">听写模式</div>
        <h3>听发音，拼写单词</h3>
      </div>
      <div class="muted">可先听发音，再输入你听到的单词。</div>
      <div class="actionRow">
        <button class="btn primary" id="dictationPlay">播放发音</button>
        <button class="btn" id="dictationReplay">重播</button>
        
        <button class="btn" id="dictationClose">关闭</button>
      </div>
      <input id="dictationInput" class="dictationInput" placeholder="请输入你听到的英文单词" autocomplete="off" />
      <div class="actionRow">
        <button class="btn warn" id="dictationCheck" style="background:#ffd66e;color:#000;font-weight:700">提交答案</button>
        <button class="btn primary" id="dictationNext" style="background:#7cc4ff;color:#000;font-weight:700">换一个</button>
        <button class="btn" id="dictationShow">显示答案</button>
      </div>
      <div id="dictationResult" class="muted"></div>
    </div>
  `;
  const play = () => speak(answer.term);
  document.getElementById('dictationPlay').onclick = play;
  document.getElementById('dictationReplay').onclick = play;
  document.getElementById('dictationNext').onclick = openDictationMode;
  document.getElementById('dictationClose').onclick = () => quizPanel.style.display = 'none';
  document.getElementById('dictationShow').onclick = () => {
    document.getElementById('dictationResult').innerHTML = `答案：<span class="resultGood">${esc(answer.term)}</span> <span class="muted">${esc(answer.ipa||'')}</span> · ${esc(answer.meaning||'—')}`;
  };
  document.getElementById('dictationCheck').onclick = () => {
    const user = (document.getElementById('dictationInput').value || '').trim().toLowerCase();
    const target = (answer.term || '').trim().toLowerCase();
    const result = document.getElementById('dictationResult');
    if(!user) {
      result.innerHTML = '<span class="resultBad">请先输入答案。</span>';
      return;
    }
    if(user === target) {
      result.innerHTML = `答对了：<span class="resultGood">${esc(answer.term)}</span> · ${esc(answer.meaning||'—')}`;
      learned.add(answer.key);
      removeMistake(answer.key);
      saveState();
      renderContent();
      playDing();
    } else {
      result.innerHTML = `答错了。你的答案：<span class="resultBad">${esc(user)}</span>；正确答案：<span class="resultGood">${esc(answer.term)}</span> <span class="muted">${esc(answer.ipa||'')}</span> · ${esc(answer.meaning||'—')}`;
      addMistake(answer);
    }
  };
  setTimeout(() => { play(); document.getElementById('dictationInput').focus(); }, 120);
  quizPanel.scrollIntoView({behavior:'smooth', block:'start'});
}

function openMistakeBook() {
  quizPanel.style.display = 'none';
  const arr = Object.entries(mistakes)
    .map(([key, val]) => ({ key, ...val }))
    .sort((a,b) => (b.wrongCount - a.wrongCount) || (b.updatedAt - a.updatedAt));
  mistakeBookPanel.style.display = 'block';
  if(!arr.length) {
    mistakeBookPanel.innerHTML = `<div class="quizCard"><div class="badge">错题本</div><h3>当前没有错题</h3><div class="muted">你答错的题会自动收录到这里。</div></div>`;
    mistakeBookPanel.scrollIntoView({behavior:'smooth', block:'start'});
    return;
  }
  mistakeBookPanel.innerHTML = `
    <div class="quizCard">
      <div class="badge">错题本</div>
      <h3>共 ${arr.length} 条错题</h3>
      <div class="actionRow">
        <button class="btn primary" id="mistakeQuizBtn">只练错题</button>
        <button class="btn" id="mistakeClearBtn">清空错题本</button>
      </div>
      <div class="listBlock">
        ${arr.map(x => `
          <div class="errorItem">
            <div class="errorTop">
              <div>
                <div class="errorWord">${esc(x.term)}</div>
                <div class="muted">${esc(x.ipa||'')} · ${esc(x.meaning||'—')}</div>
                <div class="muted">${esc(x.part||'')} / ${esc(x.section||'')}</div>
              </div>
              <div class="actionRow">
                <span class="pill">错误 ${x.wrongCount} 次</span>
                <button class="iconBtn mistakePlayBtn" data-term="${esc(x.term)}">🔊</button>
                <button class="btn mistakeRemoveBtn" data-key="${esc(x.key)}">移除</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('mistakeClearBtn').onclick = () => {
    if(confirm('确定清空错题本吗？')) { mistakes = {}; saveState(); openMistakeBook(); renderContent(); }
  };
  document.getElementById('mistakeQuizBtn').onclick = () => openMistakeQuiz();
  mistakeBookPanel.querySelectorAll('.mistakePlayBtn').forEach(btn => btn.onclick = () => speak(btn.dataset.term));
  mistakeBookPanel.querySelectorAll('.mistakeRemoveBtn').forEach(btn => btn.onclick = () => {
    removeMistake(btn.dataset.key); openMistakeBook(); renderContent();
  });
  mistakeBookPanel.scrollIntoView({behavior:'smooth', block:'start'});
}

function openMistakeQuiz() {
  const pool = Object.keys(mistakes).map(findItemByKey).filter(Boolean);
  if(pool.length < 4) {
    alert('错题少于 4 条，暂时无法进行错题选择题练习。');
    return;
  }
  quizPanel.style.display = 'block';
  mistakeBookPanel.style.display = 'none';
  const answer = pool[Math.floor(Math.random()*pool.length)];
  const others = shuffle(ALL_ITEMS.filter(x => x.key !== answer.key)).slice(0,3);
  const options = shuffle([answer, ...others]);
  quizPanel.innerHTML = `
    <div class="quizCard">
      <div>
        <div class="badge">错题专项练习</div>
        <h3>这个单词是什么意思？</h3>
      </div>
      <div class="quizWord">${esc(answer.term)}</div>
      <div class="muted">${esc(answer.ipa || '')}</div>
      <div class="actionRow">
        <button class="btn primary" id="mqPlay">播放发音</button>
        <button class="btn" id="mqNext">换一个</button>
        <button class="btn" id="mqBack">返回错题本</button>
      </div>
      <div class="quizOptions">
        ${options.map(opt => `<button class="btn quizOption" data-correct="${opt.key===answer.key?'1':'0'}">${esc(opt.meaning || '—')}</button>`).join('')}
      </div>
      <div id="mqResult" class="muted"></div>
    </div>
  `;
  document.getElementById('mqPlay').onclick = () => speak(answer.term);
  document.getElementById('mqNext').onclick = openMistakeQuiz;
  document.getElementById('mqBack').onclick = openMistakeBook;
  setTimeout(() => speak(answer.term), 120);
  quizPanel.querySelectorAll('.quizOption').forEach(btn => btn.onclick = () => {
    const ok = btn.dataset.correct === '1';
    const result = document.getElementById('mqResult');
    if(ok) {
      result.innerHTML = '<span class="resultGood">答对了。</span>';
      playDing();
      removeMistake(answer.key);
      renderContent();
    } else {
      result.innerHTML = `<span class="resultBad">答错了，正确答案：${esc(answer.meaning||'—')}</span>`;
      addMistake(answer);
    }
  });
  quizPanel.scrollIntoView({behavior:'smooth', block:'start'});
}

const parts = [...new Set(DATA.map(x => x.part).filter(Boolean))];
partSelect.innerHTML += parts.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');

function populateSectionSelect() {
  const currentPart = partSelect.value;
  const sections = [...new Set(FULL
    .filter(sec => currentPart === 'all' ? true : sec.part === currentPart)
    .map(sec => sec.section))];
  const currentValue = sectionSelect.value;
  sectionSelect.innerHTML = '<option value="all">全部子模块</option>' + sections.map(sec => {
    const display = cleanSectionName(sec);
    return `<option value="${esc(sec)}">${esc(display)}</option>`;
  }).join('');
  if (sections.includes(currentValue)) sectionSelect.value = currentValue;
}

accentSelect.value = uiState.accent || 'en-US';
repeatInput.value = uiState.repeatCount || 1;

populateSectionSelect();

searchInput.addEventListener('input', renderContent);
partSelect.addEventListener('change', () => { populateSectionSelect(); renderContent(); });
sectionSelect.addEventListener('change', renderContent);
viewSelect.addEventListener('change', renderContent);
accentSelect.addEventListener('change', () => { uiState.accent = accentSelect.value; saveState(); });
repeatInput.addEventListener('change', () => {
  let v = parseInt(repeatInput.value || '1', 10);
  if (!Number.isFinite(v) || v < 1) v = 1;
  if (v > 10) v = 10;
  repeatInput.value = v;
  uiState.repeatCount = v;
  saveState();
});
toggleCnBtn.addEventListener('click', () => { uiState.hideCn = !uiState.hideCn; saveState(); renderContent(); });
toggleIpaBtn.addEventListener('click', () => { uiState.hideIpa = !uiState.hideIpa; saveState(); renderContent(); });
document.getElementById('playVisibleBtn').addEventListener('click', () => startQueue(getVisibleTerms()));
document.getElementById('stopPlayBtn').addEventListener('click', stopPlayback);
document.getElementById('randomQuizBtn').addEventListener('click', openQuiz);
document.getElementById('dictationModeBtn').addEventListener('click', openDictationMode);
document.getElementById('mistakeBookBtn').addEventListener('click', openMistakeBook);
document.getElementById('clearProgressBtn').addEventListener('click', () => {
  if(confirm('确定清空本地收藏和已学会记录吗？')) {
    favorites = new Set(); learned = new Set(); mistakes = {}; saveState(); renderContent(); mistakeBookPanel.style.display='none'; quizPanel.style.display='none';
  }
});

renderContent();
if('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {};
  setTimeout(() => speechSynthesis.getVoices(), 50);
}
</script>
</body>
</html>
